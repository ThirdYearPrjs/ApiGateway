spring.application.name=apigateway

server.port=8765

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
eureka.client.serviceUrl.defaultZone=http://java5:8761/eureka/

spring.cloud.gateway.globalcors.add-to-idm-strategy=true

# Ensure OPTIONS requests are handled by the gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Define an explicit route for the user microservice
spring.cloud.gateway.routes[0].id=usermicroservice
spring.cloud.gateway.routes[0].uri=lb://USERMICROSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/usermicroservice/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1